<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ चहा हिशोब टूल</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --chai-dark: #2c1a0e;
            --chai-brown: #5d3a1a;
            --chai-medium: #8b5e3c;
            --chai-light: #c89a6c;
            --chai-cream: #f5e6d3;
            --chai-milk: #fdf6ee;
            --green-5: #2e7d32;
            --green-5-light: #e8f5e9;
            --orange-10: #e65100;
            --orange-10-light: #fff3e0;
            --gold: #f9a825;
            --red: #c62828;
            --shadow: 0 8px 32px rgba(44,26,14,0.18);
            --shadow-sm: 0 2px 8px rgba(44,26,14,0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans Devanagari', 'Baloo 2', sans-serif;
            background: #e8d5be;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(139,94,60,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(93,58,26,0.10) 0%, transparent 50%);
            min-height: 100vh;
            padding: 16px 8px 40px;
        }

        .card {
            background: var(--chai-milk);
            border-radius: 28px;
            box-shadow: var(--shadow);
            max-width: 440px;
            margin: 0 auto;
            overflow: hidden;
            border: 1.5px solid rgba(200,154,108,0.3);
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--chai-dark) 0%, var(--chai-brown) 100%);
            padding: 22px 20px 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(249,168,37,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        .header-emoji { font-size: 38px; line-height: 1; margin-bottom: 4px; }
        .header h1 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--chai-cream);
            letter-spacing: 0.3px;
        }
        .header .date-tag {
            display: inline-block;
            background: rgba(249,168,37,0.2);
            border: 1px solid rgba(249,168,37,0.4);
            color: var(--gold);
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 6px;
        }

        /* SECTIONS */
        .section {
            padding: 16px 18px;
            border-bottom: 1px solid rgba(200,154,108,0.2);
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--chai-medium);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* STOCK INPUT */
        .stock-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--chai-cream);
            border-radius: 14px;
            padding: 12px 16px;
            border: 1.5px solid rgba(200,154,108,0.4);
        }
        .stock-icon { font-size: 28px; }
        .stock-text { flex: 1; }
        .stock-text label {
            display: block;
            font-size: 12px;
            color: var(--chai-medium);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .stock-input {
            width: 80px;
            padding: 6px 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--chai-dark);
            border: 2px solid var(--chai-light);
            border-radius: 10px;
            text-align: center;
            background: white;
            transition: border-color 0.2s;
            font-family: 'Noto Sans Devanagari', sans-serif;
        }
        .stock-input:focus { outline: none; border-color: var(--chai-brown); }

        /* COUNTER CARDS */
        .counters-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .counter-card {
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid;
        }
        .counter-card.green { border-color: #a5d6a7; background: var(--green-5-light); }
        .counter-card.orange { border-color: #ffcc80; background: var(--orange-10-light); }

        .counter-header {
            padding: 10px 12px 8px;
            text-align: center;
        }
        .counter-card.green .counter-header { background: var(--green-5); }
        .counter-card.orange .counter-header { background: var(--orange-10); }

        .btn-add {
            width: 100%;
            border: none;
            cursor: pointer;
            font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
            font-weight: 800;
            font-size: 17px;
            color: white;
            padding: 14px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: filter 0.15s, transform 0.1s;
        }
        .btn-add:active { filter: brightness(0.88); transform: scale(0.97); }
        .btn-add span { font-size: 11px; font-weight: 600; opacity: 0.85; }

        .counter-card.green .btn-add { background: var(--green-5); }
        .counter-card.orange .btn-add { background: var(--orange-10); }

        .counter-body { padding: 10px 12px 12px; text-align: center; }
        .counter-count {
            font-size: 36px;
            font-weight: 900;
            line-height: 1.1;
        }
        .counter-card.green .counter-count { color: var(--green-5); }
        .counter-card.orange .counter-count { color: var(--orange-10); }

        .counter-sublabel { font-size: 11px; color: var(--chai-medium); margin-bottom: 10px; font-weight: 600; }

        .btn-minus {
            width: 100%;
            padding: 9px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            font-family: 'Noto Sans Devanagari', sans-serif;
            border: 1.5px solid;
        }
        .btn-minus:active { transform: scale(0.96); }
        .counter-card.green .btn-minus {
            background: white;
            color: var(--green-5);
            border-color: #a5d6a7;
        }
        .counter-card.orange .btn-minus {
            background: white;
            color: var(--orange-10);
            border-color: #ffcc80;
        }
        .counter-card.green .btn-minus:active { background: #e8f5e9; }
        .counter-card.orange .btn-minus:active { background: #fff3e0; }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-box {
            background: white;
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
            border: 1.5px solid rgba(200,154,108,0.25);
            box-shadow: var(--shadow-sm);
        }
        .stat-box.full { grid-column: span 2; background: linear-gradient(135deg, var(--chai-dark), var(--chai-brown)); }
        .stat-label { font-size: 11px; font-weight: 600; color: var(--chai-medium); margin-bottom: 4px; }
        .stat-box.full .stat-label { color: rgba(245,230,211,0.7); }
        .stat-value { font-size: 26px; font-weight: 900; color: var(--chai-dark); }
        .stat-box.full .stat-value { color: white; font-size: 30px; }
        .stat-value.warn { color: var(--red); }
        .stat-value.gold { color: var(--gold); }
        .stat-unit { font-size: 13px; font-weight: 600; }
        .stat-box.full .stat-unit { color: rgba(245,230,211,0.8); }

        /* UDHARI */
        .udhari-form { display: flex; flex-direction: column; gap: 8px; }

        .cups-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .cups-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .cups-field label { font-size: 11px; font-weight: 700; padding: 0 2px; }
        .green-field label { color: var(--green-5); }
        .orange-field label { color: var(--orange-10); }
        .cups-input { text-align: center; padding: 11px 6px !important; font-size: 18px !important; font-weight: 700 !important; }
        .green-field .cups-input { border-color: #a5d6a7 !important; color: var(--green-5) !important; }
        .orange-field .cups-input { border-color: #ffcc80 !important; color: var(--orange-10) !important; }
        .cups-plus { font-size: 20px; font-weight: 900; color: var(--chai-medium); padding-bottom: 10px; }

        .udhari-calc-row {
            background: #f3f8ff;
            border: 1px solid #bbdefb;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            color: #1565c0;
            font-weight: 600;
            text-align: center;
        }
        .udhari-input {
            padding: 11px 14px;
            border: 1.5px solid rgba(200,154,108,0.4);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Noto Sans Devanagari', sans-serif;
            background: white;
            color: var(--chai-dark);
            transition: border-color 0.2s;
        }
        .udhari-input:focus { outline: none; border-color: var(--chai-brown); }
        .udhari-input::placeholder { color: #bbb; }

        .btn-save {
            padding: 13px;
            background: linear-gradient(135deg, #1565c0, #1976d2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Sans Devanagari', sans-serif;
            transition: filter 0.15s, transform 0.1s;
        }
        .btn-save:active { filter: brightness(0.9); transform: scale(0.98); }

        /* CHAHAKATA BANNER */
        .chahakata-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            background: linear-gradient(135deg, #fff8e1, #fff3cd);
            border: 2px dashed #f9a825;
            border-radius: 16px;
            padding: 14px 16px;
        }
        .chahakata-left { display: flex; align-items: center; gap: 10px; }
        .chahakata-icon { font-size: 30px; line-height: 1; }
        .chahakata-label { font-size: 13px; font-weight: 700; color: var(--chai-brown); }
        .chahakata-sublabel { font-size: 11px; color: var(--chai-medium); margin-top: 1px; }
        .chahakata-right { text-align: right; }
        .chahakata-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--chai-dark);
            line-height: 1;
        }
        .chahakata-value.zero { color: #2e7d32; }
        .chahakata-value.warn { color: var(--red); }
        .chahakata-note {
            font-size: 11px;
            font-weight: 600;
            color: var(--chai-medium);
            margin-top: 3px;
        }
        .chahakata-note.ok { color: #2e7d32; }
        .chahakata-note.bad { color: var(--red); }
        .udhari-table-wrap { overflow-x: auto; margin-top: 12px; border-radius: 12px; border: 1px solid rgba(200,154,108,0.25); }

        /* UDHARI CARD LIST */
        .udhari-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .no-data-msg { text-align: center; color: #bbb; font-style: italic; padding: 18px 0; font-size: 14px; }
        .udhari-card {
            display: flex; align-items: center; justify-content: space-between;
            background: white; border: 1.5px solid rgba(200,154,108,0.25);
            border-radius: 14px; padding: 12px 14px; cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            box-shadow: var(--shadow-sm);
        }
        .udhari-card:active { background: var(--chai-cream); transform: scale(0.98); }
        .uc-left { flex: 1; }
        .uc-name { font-size: 15px; font-weight: 700; color: var(--chai-dark); margin-bottom: 4px; }
        .uc-cups { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
        .tag-green { background: #e8f5e9; color: var(--green-5); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid #a5d6a7; }
        .tag-orange { background: var(--orange-10-light); color: var(--orange-10); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid #ffcc80; }
        .uc-date { font-size: 11px; color: #bbb; }
        .uc-right { text-align: right; }
        .uc-amt { font-size: 20px; font-weight: 900; color: var(--red); }
        .uc-edit-hint { font-size: 11px; color: var(--chai-medium); margin-top: 3px; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(44,26,14,0.5); z-index: 100;
            align-items: flex-end; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white; border-radius: 24px 24px 0 0;
            padding: 24px 20px 32px; width: 100%; max-width: 440px;
            box-shadow: 0 -8px 32px rgba(44,26,14,0.2);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-size: 16px; font-weight: 800; color: var(--chai-dark); margin-bottom: 16px; text-align: center; }
        .modal-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .modal-label { font-size: 13px; font-weight: 700; color: var(--chai-medium); white-space: nowrap; }
        .modal-input {
            flex: 1; padding: 10px 12px; border: 1.5px solid rgba(200,154,108,0.4);
            border-radius: 10px; font-size: 15px; font-weight: 600;
            font-family: 'Noto Sans Devanagari', sans-serif; color: var(--chai-dark);
        }
        .modal-input:focus { outline: none; border-color: var(--chai-brown); }
        .modal-cups-label { font-size: 12px; font-weight: 700; color: var(--chai-medium); margin-bottom: 8px; }
        .modal-cups-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .modal-cup-col { flex: 1; background: #f9f9f9; border-radius: 14px; padding: 10px 8px; text-align: center; border: 1.5px solid; }
        .green-col { border-color: #a5d6a7; }
        .orange-col { border-color: #ffcc80; }
        .modal-cup-label { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
        .green-col .modal-cup-label { color: var(--green-5); }
        .orange-col .modal-cup-label { color: var(--orange-10); }
        .modal-counter-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .modal-cup-val { font-size: 26px; font-weight: 900; min-width: 32px; text-align: center; }
        .green-col .modal-cup-val { color: var(--green-5); }
        .orange-col .modal-cup-val { color: var(--orange-10); }
        .modal-cup-sep { font-size: 20px; font-weight: 700; color: var(--chai-medium); }
        .modal-btn-pm {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            font-size: 20px; font-weight: 700; cursor: pointer; line-height: 1;
            transition: transform 0.1s;
        }
        .modal-btn-pm:active { transform: scale(0.9); }
        .modal-btn-pm.minus { background: #ffebee; color: var(--red); }
        .modal-btn-pm.plus { background: #e8f5e9; color: var(--green-5); }
        .modal-amt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: var(--chai-cream); border-radius: 14px; padding: 12px 14px; }
        .modal-amt-controls { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; flex-wrap: wrap; }
        .modal-amt-val { font-size: 22px; font-weight: 900; color: var(--red); min-width: 60px; text-align: center; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn-del {
            flex: 1; padding: 13px; background: #ffebee; color: var(--red);
            border: 1.5px solid #ffcdd2; border-radius: 14px; font-size: 14px;
            font-weight: 700; cursor: pointer; font-family: 'Noto Sans Devanagari', sans-serif;
        }
        .modal-btn-save {
            flex: 2; padding: 13px; background: linear-gradient(135deg, #2e7d32, #388e3c);
            color: white; border: none; border-radius: 14px; font-size: 15px;
            font-weight: 700; cursor: pointer; font-family: 'Noto Sans Devanagari', sans-serif;
            box-shadow: 0 4px 12px rgba(46,125,50,0.3);
        }

        /* TOTAL UDHARI */
        .udhari-total {
            background: #fff3e0;
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ffcc80;
        }
        .udhari-total span { font-size: 13px; font-weight: 600; color: var(--orange-10); }
        .udhari-total strong { font-size: 18px; color: var(--red); font-weight: 900; }

        /* RESET */
        .footer { padding: 16px 18px 20px; text-align: center; }
        .footer-btns { display: flex; gap: 10px; justify-content: center; }
        .btn-reset {
            flex: 1;
            background: linear-gradient(135deg, #b71c1c, #c62828);
            color: white; border: none; padding: 13px 20px; border-radius: 25px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: 'Noto Sans Devanagari', sans-serif;
            box-shadow: 0 4px 14px rgba(198,40,40,0.3);
            transition: filter 0.15s, transform 0.1s;
        }
        .btn-reset:active { filter: brightness(0.9); transform: scale(0.97); }
        .btn-print {
            flex: 1;
            background: linear-gradient(135deg, #1565c0, #1976d2);
            color: white; border: none; padding: 13px 20px; border-radius: 25px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: 'Noto Sans Devanagari', sans-serif;
            box-shadow: 0 4px 14px rgba(21,101,192,0.3);
            transition: filter 0.15s, transform 0.1s;
        }
        .btn-print:active { filter: brightness(0.9); transform: scale(0.97); }

        /* PRINT STYLES */
        @media print {
            body { background: white !important; padding: 0 !important; font-family: sans-serif; }
            .card { box-shadow: none !important; border: none !important; max-width: 100% !important; border-radius: 0 !important; }
            .header { background: #5d3a1a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; border-radius: 0 !important; }
            .control-group, .btn-plus, .btn-minus, .btn-save, .btn-reset, .btn-print,
            .footer, .udhari-form, .modal-overlay, .counters-row, .stock-section,
            .section-label { display: none !important; }
            .stats-grid, .chahakata-banner, .udhari-list, .udhari-total { display: block !important; }
            .stat-box.full { background: #3e2723 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .udhari-card { box-shadow: none !important; border: 1px solid #ccc !important; page-break-inside: avoid; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; }

        /* RIPPLE / PULSE ON BIG BUTTONS */
        @keyframes pop {
            0% { transform: scale(1); }
            40% { transform: scale(0.94); }
            100% { transform: scale(1); }
        }
        .popping { animation: pop 0.18s ease; }
    </style>
</head>
<body>

<div class="card">

    <!-- HEADER -->
    <div class="header">
        <div class="header-emoji">☕</div>
        <h1>चहा हिशोब टूल</h1>
        <div class="date-tag" id="currentDate"></div>
    </div>

    <!-- STOCK -->
    <div class="section">
        <div class="section-label">📦 आजचा स्टॉक</div>
        <div class="stock-row">
            <div class="stock-icon">🧾</div>
            <div class="stock-text">
                <label>आज एकूण किती कप चहा नेली?</label>
                <input class="stock-input" type="number" id="initialStock" value="0" min="0" oninput="updateUI()">
            </div>
        </div>
    </div>

    <!-- COUNTERS -->
    <div class="section">
        <div class="section-label">➕ विक्री नोंदवा</div>
        <div class="counters-row">
            <!-- 5 Rs -->
            <div class="counter-card green">
                <button class="btn-add" onclick="addTea(5, 1); animPop(this)">
                    ५ रुपये
                    <span>एक कप +</span>
                </button>
                <div class="counter-body">
                    <div class="counter-count" id="count5">0</div>
                    <div class="counter-sublabel">कप विकले</div>
                    <button class="btn-minus" onclick="addTea(5, -1)">− कमी करा</button>
                </div>
            </div>
            <!-- 10 Rs -->
            <div class="counter-card orange">
                <button class="btn-add" onclick="addTea(10, 1); animPop(this)">
                    १० रुपये
                    <span>एक कप +</span>
                </button>
                <div class="counter-body">
                    <div class="counter-count" id="count10">0</div>
                    <div class="counter-sublabel">कप विकले</div>
                    <button class="btn-minus" onclick="addTea(10, -1)">− कमी करा</button>
                </div>
            </div>
        </div>
    </div>

    <!-- STATS -->
    <div class="section">
        <div class="section-label">📊 आजचा हिशोब</div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">विकलेले कप</div>
                <div class="stat-value" id="soldCups">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">शिल्लक कप</div>
                <div class="stat-value" id="remCups">0</div>
            </div>
            <div class="stat-box full">
                <div class="stat-label">एकूण गल्ला</div>
                <div class="stat-value gold"><span id="totalSales">0</span> <span class="stat-unit">रुपये</span></div>
            </div>
        </div>

        <!-- CHAHAKATA BANNER -->
        <div class="chahakata-banner" id="chahakataBox">
            <div class="chahakata-left">
                <div class="chahakata-icon">🫖</div>
                <div>
                    <div class="chahakata-label">आजचे चहाकट</div>
                    <div class="chahakata-sublabel">(न विकलेले कप)</div>
                </div>
            </div>
            <div class="chahakata-right">
                <div class="chahakata-value"><span id="chahakataCount">—</span></div>
                <div class="chahakata-note" id="chahakataNote">स्टॉक भरा</div>
            </div>
        </div>
    </div>

    <!-- UDHARI -->
    <div class="section">
        <div class="section-label">📝 उधारी नोंद</div>
        <div class="udhari-form">
            <input class="udhari-input" type="text" id="custName" placeholder="ग्राहकाचे नाव लिहा...">
            <div class="cups-row">
                <div class="cups-field green-field">
                    <label>५ रु. कप</label>
                    <input class="udhari-input cups-input" type="number" id="udhariCups5" placeholder="0" min="0" oninput="calcUdhariAmt()">
                </div>
                <div class="cups-plus">+</div>
                <div class="cups-field orange-field">
                    <label>१० रु. कप</label>
                    <input class="udhari-input cups-input" type="number" id="udhariCups10" placeholder="0" min="0" oninput="calcUdhariAmt()">
                </div>
            </div>
            <div class="udhari-calc-row" id="udhariCalcRow" style="display:none;">
                <span id="udhariCalcText"></span>
            </div>
            <input class="udhari-input" type="number" id="udhariAmt" placeholder="रक्कम (रुपये) — आपोआप भरते" min="0">
            <button class="btn-save" onclick="addUdhari()">✔ उधारी नोंदवा</button>
        </div>

        <div class="udhari-list" id="udhariBody">
            <div class="no-data-msg">अद्याप कोणतीही उधारी नाही</div>
        </div>

        <div class="udhari-total">
            <span>एकूण उधारी:</span>
            <strong>₹<span id="totalUdhari">0</span></strong>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editModal" onclick="closeModal(event)">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">उधारी बदल करा</div>

            <div class="modal-name-row">
                <span class="modal-label">नाव:</span>
                <input class="modal-input" id="modalName" type="text">
            </div>

            <div class="modal-cups-label">कप बदलायचे असतील तर:</div>
            <div class="modal-cups-row">
                <div class="modal-cup-col green-col">
                    <div class="modal-cup-label">५ रु. कप</div>
                    <div class="modal-counter-row">
                        <button class="modal-btn-pm minus" onclick="adjustModalCup(5,-1)">−</button>
                        <span class="modal-cup-val" id="modalC5">0</span>
                        <button class="modal-btn-pm plus" onclick="adjustModalCup(5,1)">+</button>
                    </div>
                </div>
                <div class="modal-cup-sep">+</div>
                <div class="modal-cup-col orange-col">
                    <div class="modal-cup-label">१० रु. कप</div>
                    <div class="modal-counter-row">
                        <button class="modal-btn-pm minus" onclick="adjustModalCup(10,-1)">−</button>
                        <span class="modal-cup-val" id="modalC10">0</span>
                        <button class="modal-btn-pm plus" onclick="adjustModalCup(10,1)">+</button>
                    </div>
                </div>
            </div>

            <div class="modal-amt-row">
                <span class="modal-label">रक्कम:</span>
                <div class="modal-amt-controls">
                    <button class="modal-btn-pm minus" onclick="adjustModalAmt(-5)">−५</button>
                    <button class="modal-btn-pm minus" onclick="adjustModalAmt(-1)">−१</button>
                    <span class="modal-amt-val">₹<span id="modalAmt">0</span></span>
                    <button class="modal-btn-pm plus" onclick="adjustModalAmt(1)">+१</button>
                    <button class="modal-btn-pm plus" onclick="adjustModalAmt(5)">+५</button>
                </div>
            </div>

            <div class="modal-actions">
                <button class="modal-btn-del" onclick="deleteFromModal()">🗑 पुसा</button>
                <button class="modal-btn-save" onclick="saveFromModal()">✔ जतन करा</button>
            </div>
        </div>
    </div>

    <!-- RESET + PRINT -->
    <div class="footer">
        <div class="footer-btns">
            <button class="btn-print" onclick="printHishob()">🖨️ Print करा</button>
            <button class="btn-reset" onclick="resetApp()">🔄 रिसेट</button>
        </div>
    </div>

</div>

<script>
    let c5 = 0, c10 = 0, totalAmt = 0, udhariList = [];

    // Date in Marathi
    const today = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('currentDate').innerText = today.toLocaleDateString('mr-IN', options);

    function addTea(price, change) {
        if (price === 5) {
            if (c5 + change < 0) return;
            c5 += change;
        } else {
            if (c10 + change < 0) return;
            c10 += change;
        }
        totalAmt += price * change;
        if (totalAmt < 0) totalAmt = 0;
        updateUI();
    }

    function updateUI() {
        const stock = parseInt(document.getElementById('initialStock').value) || 0;
        const sold = c5 + c10;
        const remaining = stock - sold;

        document.getElementById('count5').innerText = c5;
        document.getElementById('count10').innerText = c10;
        document.getElementById('soldCups').innerText = sold;
        document.getElementById('totalSales').innerText = totalAmt;

        const remEl = document.getElementById('remCups');
        remEl.innerText = remaining;
        remEl.className = 'stat-value' + (remaining < 0 ? ' warn' : '');

        // CHAHAKATA — unsold cups at end of day
        const ckEl = document.getElementById('chahakataCount');
        const ckNote = document.getElementById('chahakataNote');
        const ckVal = document.querySelector('.chahakata-value');
        if (stock === 0) {
            ckEl.innerText = '—';
            ckNote.innerText = 'स्टॉक भरा';
            ckNote.className = 'chahakata-note';
            ckVal.className = 'chahakata-value';
        } else {
            const chahakata = remaining < 0 ? 0 : remaining;
            ckEl.innerText = chahakata;
            if (chahakata === 0) {
                ckNote.innerText = '✅ सर्व कप विकले!';
                ckNote.className = 'chahakata-note ok';
                ckVal.className = 'chahakata-value zero';
            } else if (chahakata <= 5) {
                ckNote.innerText = '⚠️ थोडे शिल्लक';
                ckNote.className = 'chahakata-note';
                ckVal.className = 'chahakata-value';
            } else {
                ckNote.innerText = '❌ खूप कप राहिले';
                ckNote.className = 'chahakata-note bad';
                ckVal.className = 'chahakata-value warn';
            }
        }
    }

    function calcUdhariAmt() {
        const cups5 = parseInt(document.getElementById('udhariCups5').value) || 0;
        const cups10 = parseInt(document.getElementById('udhariCups10').value) || 0;
        const total = (cups5 * 5) + (cups10 * 10);
        const calcRow = document.getElementById('udhariCalcRow');
        if (cups5 > 0 || cups10 > 0) {
            let parts = [];
            if (cups5 > 0) parts.push(`${cups5} × ₹5 = ₹${cups5 * 5}`);
            if (cups10 > 0) parts.push(`${cups10} × ₹10 = ₹${cups10 * 10}`);
            document.getElementById('udhariCalcText').innerText = parts.join('  +  ') + `  =  एकूण ₹${total}`;
            calcRow.style.display = 'block';
        } else {
            calcRow.style.display = 'none';
        }
        document.getElementById('udhariAmt').value = total > 0 ? total : '';
    }

    function addUdhari() {
        const name = document.getElementById('custName').value.trim();
        const amt = parseInt(document.getElementById('udhariAmt').value);
        const cups5 = parseInt(document.getElementById('udhariCups5').value) || 0;
        const cups10 = parseInt(document.getElementById('udhariCups10').value) || 0;
        if (!name || !amt || amt <= 0) {
            alert("कृपया नाव आणि रक्कम दोन्ही भरा!");
            return;
        }
        const dateStr = new Date().toLocaleDateString('mr-IN');
        udhariList.push({ name, cups5, cups10, amt, date: dateStr });
        document.getElementById('custName').value = '';
        document.getElementById('udhariCups5').value = '';
        document.getElementById('udhariCups10').value = '';
        document.getElementById('udhariAmt').value = '';
        document.getElementById('udhariCalcRow').style.display = 'none';
        renderUdhari();
    }

    let editingIndex = -1;

    function renderUdhari() {
        const container = document.getElementById('udhariBody');
        if (udhariList.length === 0) {
            container.innerHTML = '<div class="no-data-msg">अद्याप कोणतीही उधारी नाही</div>';
            document.getElementById('totalUdhari').innerText = 0;
            return;
        }
        let total = 0;
        container.innerHTML = udhariList.map((u, i) => {
            total += u.amt;
            const cupsText = [
                u.cups5 > 0 ? `<span class="tag-green">${u.cups5} × ५रु.</span>` : '',
                u.cups10 > 0 ? `<span class="tag-orange">${u.cups10} × १०रु.</span>` : ''
            ].filter(Boolean).join(' ');
            return `<div class="udhari-card" onclick="openEditModal(${i})">
                <div class="uc-left">
                    <div class="uc-name">${u.name}</div>
                    <div class="uc-cups">${cupsText || '<span style="color:#bbb;font-size:11px;">कप नोंद नाही</span>'}</div>
                    <div class="uc-date">${u.date}</div>
                </div>
                <div class="uc-right">
                    <div class="uc-amt">₹${u.amt}</div>
                    <div class="uc-edit-hint">✏️ बदल</div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('totalUdhari').innerText = total;
    }

    function openEditModal(i) {
        editingIndex = i;
        const u = udhariList[i];
        document.getElementById('modalTitle').innerText = `"${u.name}" — उधारी बदल`;
        document.getElementById('modalName').value = u.name;
        document.getElementById('modalC5').innerText = u.cups5;
        document.getElementById('modalC10').innerText = u.cups10;
        document.getElementById('modalAmt').innerText = u.amt;
        document.getElementById('editModal').classList.add('open');
    }

    function closeModal(e) {
        if (!e || e.target.id === 'editModal') {
            document.getElementById('editModal').classList.remove('open');
            editingIndex = -1;
        }
    }

    function adjustModalCup(price, delta) {
        const id = price === 5 ? 'modalC5' : 'modalC10';
        const el = document.getElementById(id);
        const newVal = Math.max(0, (parseInt(el.innerText) || 0) + delta);
        el.innerText = newVal;
        // recalc amount from cups
        const c5 = parseInt(document.getElementById('modalC5').innerText) || 0;
        const c10 = parseInt(document.getElementById('modalC10').innerText) || 0;
        const calc = c5 * 5 + c10 * 10;
        if (calc > 0) document.getElementById('modalAmt').innerText = calc;
    }

    function adjustModalAmt(delta) {
        const el = document.getElementById('modalAmt');
        const newVal = Math.max(0, (parseInt(el.innerText) || 0) + delta);
        el.innerText = newVal;
    }

    function saveFromModal() {
        if (editingIndex < 0) return;
        const name = document.getElementById('modalName').value.trim();
        const cups5 = parseInt(document.getElementById('modalC5').innerText) || 0;
        const cups10 = parseInt(document.getElementById('modalC10').innerText) || 0;
        const amt = parseInt(document.getElementById('modalAmt').innerText) || 0;
        if (!name || amt <= 0) { alert("नाव आणि रक्कम रिकामे ठेवू नका!"); return; }
        udhariList[editingIndex] = { ...udhariList[editingIndex], name, cups5, cups10, amt };
        closeModal();
        renderUdhari();
    }

    function deleteFromModal() {
        if (editingIndex < 0) return;
        if (confirm(`"${udhariList[editingIndex].name}" ची नोंद पुसायची का?`)) {
            udhariList.splice(editingIndex, 1);
            closeModal();
            renderUdhari();
        }
    }

    function animPop(btn) {
        btn.classList.remove('popping');
        void btn.offsetWidth;
        btn.classList.add('popping');
    }

    function printHishob() {
        // Build a clean print page
        const dateStr = document.getElementById('currentDate').innerText;
        const sold5 = c5, sold10 = c10;
        const stock = parseInt(document.getElementById('initialStock').value) || 0;
        const chahakata = Math.max(0, stock - (sold5 + sold10));
        const totalUdhari = udhariList.reduce((s, u) => s + u.amt, 0);

        let udhariRows = udhariList.length === 0
            ? '<tr><td colspan="4" style="color:#aaa;text-align:center;padding:12px;">उधारी नाही</td></tr>'
            : udhariList.map(u => `<tr>
                <td>${u.name}</td>
                <td style="text-align:center;color:#2e7d32;font-weight:700;">${u.cups5 > 0 ? u.cups5 : '—'}</td>
                <td style="text-align:center;color:#e65100;font-weight:700;">${u.cups10 > 0 ? u.cups10 : '—'}</td>
                <td style="text-align:center;font-weight:700;color:#c62828;">₹${u.amt}</td>
              </tr>`).join('');

        const html = `<!DOCTYPE html><html lang="mr"><head><meta charset="UTF-8">
        <title>चहा हिशोब — ${dateStr}</title>
        <style>
            body { font-family: 'Noto Sans Devanagari', sans-serif; padding: 24px; max-width: 480px; margin: auto; color: #2c1a0e; }
            h2 { text-align:center; color:#5d3a1a; margin:0 0 4px; }
            .date { text-align:center; color:#888; font-size:13px; margin-bottom:16px; }
            .summary { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
            .sbox { background:#f5e6d3; border-radius:10px; padding:10px 14px; }
            .sbox.dark { background:#3e2723; color:white; grid-column:span 2; text-align:center; }
            .sbox label { font-size:11px; color:#8b5e3c; display:block; margin-bottom:3px; }
            .sbox.dark label { color:rgba(245,230,211,0.7); }
            .sbox span { font-size:22px; font-weight:900; }
            .sbox.dark span { color:#f9a825; font-size:26px; }
            .chahakata { border:2px dashed #f9a825; background:#fff8e1; border-radius:10px; padding:10px 16px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
            .chahakata b { font-size:13px; color:#5d3a1a; }
            .chahakata span { font-size:26px; font-weight:900; color:${chahakata === 0 ? '#2e7d32' : chahakata <= 5 ? '#f9a825' : '#c62828'}; }
            table { width:100%; border-collapse:collapse; font-size:13px; }
            th { background:#f5e6d3; padding:8px; text-align:left; color:#5d3a1a; font-size:12px; }
            td { padding:8px; border-top:1px solid #eee; }
            .total-row td { font-weight:700; background:#fff3e0; color:#c62828; border-top:2px solid #ffcc80; }
            h3 { font-size:14px; color:#5d3a1a; margin:16px 0 8px; }
            @media print { button { display:none; } }
        </style></head><body>
        <h2>☕ चहा हिशोब</h2>
        <div class="date">${dateStr}</div>
        <div class="summary">
            <div class="sbox"><label>५रु. कप विकले</label><span>${sold5}</span></div>
            <div class="sbox"><label>१०रु. कप विकले</label><span>${sold10}</span></div>
            <div class="sbox"><label>एकूण विकलेले कप</label><span>${sold5 + sold10}</span></div>
            <div class="sbox"><label>शिल्लक कप</label><span>${stock - sold5 - sold10}</span></div>
            <div class="sbox dark"><label>एकूण गल्ला</label><span>₹${totalAmt}</span></div>
        </div>
        <div class="chahakata">
            <b>🫖 आजचे चहाकट (न विकलेले कप)</b>
            <span>${chahakata}</span>
        </div>
        <h3>📝 उधारी यादी</h3>
        <table>
            <thead><tr><th>नाव</th><th>५रु.कप</th><th>१०रु.कप</th><th>रक्कम</th></tr></thead>
            <tbody>${udhariRows}</tbody>
            ${udhariList.length > 0 ? `<tfoot><tr class="total-row"><td colspan="3">एकूण उधारी</td><td>₹${totalUdhari}</td></tr></tfoot>` : ''}
        </table>
        <br>
        <div style="text-align:center;font-size:12px;color:#aaa;margin-top:20px;">— हिशोब संपला —</div>
        <script>window.onload = () => window.print();<\/script>
        </body></html>`;

        const win = window.open('', '_blank');
        win.document.write(html);
        win.document.close();
    }

    function resetApp() {
        if (confirm("⚠️ सावधान!\n\nआजचा सर्व हिशोब पुसला जाईल.\nखात्री आहे का?")) {
            location.reload();
        }
    }
</script>
</body>
</html>
